<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LifeOS</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <!-- Login Card -->
  <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8">

    <!-- Logo -->
    <div class="text-center mb-8">

      <h1 class="text-4xl font-bold text-orange-500">
        LifeOS
      </h1>

      <p class="text-gray-500 mt-2">
        Welcome back to your productivity system
      </p>

    </div>

    <!-- Login Form -->
    <div class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <input
            id="signupEmail"
            type="email"
            placeholder="Enter your email"
            class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:border-orange-500"/>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
        <input
          id="loginUsername"
          type="text"
          placeholder="Enter your username"
          class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:border-orange-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Password
        </label>

        <input
          id="loginPassword"
          type="password"
          placeholder="Enter your password"
          class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:border-orange-500">
      </div>

      <button
        id="loginBtn"
        class="w-full bg-orange-500 text-white rounded-xl p-3 hover:bg-orange-600 transition font-semibold">
        Login
      </button>

    </div>

    <!-- Divider -->
    <div class="border-t my-6"></div>

    <!-- Sign Up -->
    <p class="text-center text-gray-500 text-sm">Don't have an account?
      <a href="signup.html" class="text-orange-500 font-semibold hover:underline">
        Sign Up
      </a>
    </p>

  </div>

  <script src="javascript/login.js"></script>

</body>
</html>
