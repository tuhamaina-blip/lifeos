<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Planner - LifeOS</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 text-gray-800 overflow-x-hidden">

  <!-- Navigation Bar -->
  <nav class="bg-gray-900 shadow">

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center px-4 md:px-6 py-4 gap-3">

      <h1 class="text-2xl font-bold text-orange-500">
        LifeOS
      </h1>

      <ul class="flex flex-wrap justify-center gap-4 md:gap-6 text-sm text-white">
        <li><a href="index.html" class="hover:text-orange-500 transition">Dashboard</a></li>
        <li><a href="expenses.html" class="hover:text-orange-500 transition">Expenses</a></li>
        <li><a href="planner.html" class="text-orange-500 font-semibold">Study</a></li>
        <li><a href="habits.html" class="hover:text-orange-500 transition">Habits</a></li>
        <li><a href="goals.html" class="hover:text-orange-500 transition">Goals</a></li>
      </ul>

    </div>

  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto p-4 md:p-6">

    <!-- Study Overview -->
    <section class="bg-gradient-to-r from-gray-900 to-gray-800 text-white rounded-3xl p-8 shadow-lg mb-8">

      <p class="text-orange-400 uppercase tracking-widest text-sm mb-2">
        Study Planner
      </p>

      <h2 class="text-4xl font-bold mb-3">
        Plan Your Tasks
      </h2>

      <p class="text-gray-300">
        Organize your study schedule and stay consistent with your goals.
      </p>

    </section>

    <!-- Summary Cards -->
    <section class="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-8">

      <div class="bg-white rounded-2xl shadow p-6 border-t-4 border-orange-500 hover:shadow-xl transition">

        <p class="text-gray-500 text-sm mb-2">
          TOTAL TASKS
        </p>

        <h3 id="totalTasks" class="text-4xl font-bold">
          0
        </h3>

      </div>

      <div class="bg-white rounded-2xl shadow p-6 border-t-4 border-gray-700 hover:shadow-xl transition">

        <p class="text-gray-500 text-sm mb-2">
          COMPLETED
        </p>

        <h3 id="completedTasks" class="text-4xl font-bold">
          0
        </h3>

      </div>

      <div class="bg-white rounded-2xl shadow p-6 border-t-4 border-gray-700 hover:shadow-xl transition">

        <p class="text-gray-500 text-sm mb-2">
          PENDING
        </p>

        <h3 id="pendingTasks" class="text-4xl font-bold">
          0
        </h3>

      </div>

    </section>

    <!-- Add Task -->
    <section class="bg-white rounded-3xl shadow p-6 mb-8">

      <h3 class="text-xl font-semibold mb-5">
        Add Task
      </h3>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

        <input
          id="taskName"
          type="text"
          placeholder="Task name"
          class="border p-3 rounded-xl w-full"
        >

        <input
          id="taskDate"
          type="date"
          class="border p-3 rounded-xl w-full"
        >

        <button
          id="addTaskBtn"
          class="bg-orange-500 text-white rounded-xl hover:bg-orange-600 transition"
        >
          Add Task
        </button>

      </div>

    </section>

    <!-- Task List -->
    <section class="bg-white rounded-3xl shadow p-6">

      <div class="flex justify-between items-center mb-5">

        <h3 class="text-2xl font-semibold">
          Tasks
        </h3>

      </div>

      <div id="taskList" class="space-y-4">

        <p class="text-gray-400 text-sm">
          No tasks yet...
        </p>

      </div>

    </section>

    <!-- Footer -->
    <footer class="text-center text-gray-500 text-sm mt-10">
      LifeOS Study Planner • 2026
    </footer>

  </main>

  <script src="../JavaScript/planner.js"></script>

</body>
</html>
