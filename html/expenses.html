<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses - LifeOS</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 text-gray-800 overflow-x-hidden">
  <script>
  const user = JSON.parse(localStorage.getItem("lifeosLoggedIn"));

  if (!user) {
    window.location.href = "login.html";
  }
</script>

  <!-- Navigation Bar -->
  <nav class="bg-gray-900 shadow">

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center px-4 md:px-6 py-4 gap-3">

      <h1 class="text-2xl font-bold text-orange-500">
        LifeOS
      </h1>

      <ul class="flex flex-wrap justify-center gap-4 md:gap-6 text-sm text-white">
        <li><a href="index.html" class="hover:text-orange-500 transition">Dashboard</a></li>
        <li><a href="expenses.html" class="text-orange-500 font-semibold">Expenses</a></li>
        <li><a href="planner.html" class="hover:text-orange-500 transition">Study</a></li>
        <li><a href="habits.html" class="hover:text-orange-500 transition">Habits</a></li>
        <li><a href="goals.html" class="hover:text-orange-500 transition">Goals</a></li>
        <button id="logoutBtn" class="text-sm text-orange-400 hover:text-orange-300">Logout</button>
      </ul>

    </div>

  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto p-4 md:p-6">

    <!-- Expenses Overview -->
    <section class="bg-gradient-to-r from-gray-900 to-gray-800 text-white rounded-3xl p-8 shadow-lg mb-8">

      <p class="text-orange-400 uppercase tracking-widest text-sm mb-2">
        Expense Tracker
      </p>

      <h2 class="text-4xl font-bold mb-3">
        Manage Your Spending
      </h2>

      <p class="text-gray-300">
        Track your expenses and understand where your money goes.
      </p>

    </section>

    <!-- Summary Cards -->
    <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 mb-8">

      <div class="bg-white rounded-2xl shadow p-6 border-t-4 border-orange-500 hover:shadow-xl transition">

        <p class="text-gray-500 text-sm mb-2">
          TOTAL SPENT
        </p>

        <h3 id="totalSpent" class="text-4xl font-bold text-orange-500">
          0
        </h3>

      </div>

      <div class="bg-white rounded-2xl shadow p-6 border-t-4 border-gray-700 hover:shadow-xl transition">

        <p class="text-gray-500 text-sm mb-2">
          HIGHEST CATEGORY
        </p>

        <h3 id="highestCategory" class="text-3xl font-bold">
          -
        </h3>

      </div>

      <div class="bg-white rounded-2xl shadow p-6 border-t-4 border-gray-700 hover:shadow-xl transition">

        <p class="text-gray-500 text-sm mb-2">
          TRANSACTIONS
        </p>

        <h3 id="transactionCount" class="text-4xl font-bold">
          0
        </h3>

      </div>

    </section>

    <!-- Add Expense -->
    <section class="bg-white rounded-3xl shadow p-6 mb-8">

      <h3 class="text-xl font-semibold mb-5">
        Add Expense
      </h3>

      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">

        <input
          id="expenseName"
          type="text"
          placeholder="Expense name"
          class="border p-3 rounded-xl w-full"
        >

        <input
          id="expenseAmount"
          type="number"
          placeholder="Amount"
          class="border p-3 rounded-xl w-full"
        >

        <select
          id="expenseCategory"
          class="border p-3 rounded-xl w-full"
        >
          <option>Food</option>
          <option>Transport</option>
          <option>School</option>
          <option>Entertainment</option>
          <option>Other</option>
        </select>

        <button
          id="addExpenseBtn"
          class="bg-orange-500 text-white rounded-xl hover:bg-orange-600 transition"
        >
          Add Expense
        </button>

      </div>

    </section>

    <!-- Expense History -->
    <section class="bg-white rounded-3xl shadow p-6">

      <div class="flex justify-between items-center mb-5">

        <h3 class="text-2xl font-semibold">
          Recent Expenses
        </h3>

      </div>

      <div id="expenseList" class="space-y-4">

        <p class="text-gray-400 text-sm">
          No expenses yet...
        </p>

      </div>

    </section>

    <!-- Footer -->
    <footer class="text-center text-gray-500 text-sm mt-10">

      LifeOS Expense Tracker • 2026

    </footer>

  </main>

  <script src="../JavaScript/expenses.js"></script>

</body>
</html>
