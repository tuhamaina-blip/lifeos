<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker - LifeOS</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 text-gray-800 overflow-x-hidden">

  <!-- Nav Bar -->
  <nav class="flex flex-col md:flex-row justify-between items-center px-4 md:px-6 py-4 bg-gray-900 text-white gap-3">

    <h1 class="text-xl font-bold text-orange-500">LifeOS</h1>

    <ul class="flex flex-wrap justify-center md:justify-end gap-4 md:gap-6 text-sm">
      <li><a href="index.html" class="hover:text-orange-500">Dashboard</a></li>
      <li><a href="expenses.html" class="hover:text-orange-500">Expenses</a></li>
      <li><a href="planner.html" class="hover:text-orange-500">Study</a></li>
      <li><a href="habits.html" class="hover:text-orange-500 text-orange-500">Habits</a></li>
      <li><a href="goals.html" class="hover:text-orange-500">Goals</a></li>
    </ul>

  </nav>

  <!-- Content -->
  <main class="p-4 md:p-6">

    <!-- Header -->
    <div class="mb-6">
      <h2 class="text-2xl font-bold">Habit Tracker</h2>
      <p class="text-gray-600">Build consistency one day at a time</p>
    </div>

    <!-- Input -->
    <div class="bg-white p-4 rounded-xl shadow mb-6 flex flex-col sm:flex-row gap-3">

      <input id="habitName" type="text" placeholder="Habit name" class="border p-2 rounded flex-1 w-full">

      <button id="addHabitBtn" class="bg-orange-500 text-white rounded px-4 py-2 hover:bg-orange-600 w-full sm:w-auto">Add Habit</button>

    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-6">

      <div class="bg-white p-4 rounded-xl shadow">
        <p class="text-gray-500">Total Habits</p>
        <h3 class="text-2xl font-bold" id="totalHabits">0</h3>
      </div>

      <div class="bg-white p-4 rounded-xl shadow">
        <p class="text-gray-500">Completed Today</p>
        <h3 class="text-2xl font-bold" id="completedHabits">0</h3>
      </div>

      <div class="bg-white p-4 rounded-xl shadow">
        <p class="text-gray-500">Longest Streak</p>
        <h3 class="text-2xl font-bold" id="longestStreak">0</h3>
      </div>

    </div>

    <!-- HABIT LIST -->
    <div class="bg-white p-4 rounded-xl shadow">

      <h3 class="font-semibold mb-3">Habits</h3>

      <div id="habitList" class="space-y-3">
        <p class="text-gray-400 text-sm">No habits yet...</p>
      </div>

    </div>

  </main>

</body>
</html>
