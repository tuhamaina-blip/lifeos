<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 text-gray-800">

  <!-- Nav Bar-->
  <nav class="flex justify-between items-center px-6 py-4 bg-gray-900 text-white">
    <h1 class="text-xl font-bold text-orange-500">LifeOS</h1>

    <ul class="flex gap-6 text-sm">
      <li><a href="index.html" class="hover:text-orange-500">Dashboard</a></li>
      <li><a href="expenses.html" class="hover:text-orange-500 text-orange-500">Expenses</a></li>
      <li><a href="planner.html" class="hover:text-orange-500">Study</a></li>
      <li><a href="habits.html" class="hover:text-orange-500">Habits</a></li>
      <li><a href="goals.html" class="hover:text-orange-500">Goals</a></li>
    </ul>
  </nav>

  <!-- Content -->
  <main class="p-6">

    <!-- HEADER -->
    <div class="mb-6">
      <h2 class="text-2xl font-bold">Expense Tracker</h2>
      <p class="text-gray-600">Track your spending and stay in control</p>
    </div>

    <!-- Inut card -->
    <div class="bg-white p-4 rounded-xl shadow mb-6 grid md:grid-cols-4 gap-3">
    <input id="expenseName" type="text" placeholder="Expense name" class="border p-2 rounded">
    <input id="expenseAmount" type="number" placeholder="Amount" class="border p-2 rounded">

      <select id="expenseCategory" class="border p-2 rounded">
        <option>Food</option>
        <option>Transport</option>
        <option>School</option>
        <option>Entertainment</option>
        <option>Other</option>
      </select>

      <button id="addExpenseBtn" class="bg-orange-500 text-white rounded p-2 hover:bg-orange-600">Add Expense</button>

    </div>

    <!-- Summary -->
    <div class="grid md:grid-cols-3 gap-4 mb-6">

      <div class="bg-white p-4 rounded-xl shadow">
        <p class="text-gray-500">Total Spent</p>
        <h3 id="totalSpent" class="text-2xl font-bold text-orange-500">0</h3>
      </div>

      <div class="bg-white p-4 rounded-xl shadow">
        <p class="text-gray-500">Highest Category</p>
        <h3 id="highestCategory" class="text-xl font-semibold">-</h3>
      </div>

      <div class="bg-white p-4 rounded-xl shadow">
        <p class="text-gray-500">Transactions</p>
        <h3 id="transactionCount" class="text-2xl font-bold">0</h3>
      </div>

    </div>

   <!-- List -->
<div class="bg-white p-4 rounded-xl shadow">
  <h3 class="font-semibold mb-3">Recent Expenses</h3>

  <div id="expenseList" class="space-y-3">
    <p class="text-gray-400 text-sm">No expenses yet...</p>
  </div>

</div>

  </main>
    <script src="expenses.js"></script>
</body>
</html>
