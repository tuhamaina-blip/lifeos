<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeOS Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 text-gray-800 overflow-x-hidden">

  <!-- Navbar -->
  <nav class="flex flex-col md:flex-row justify-between items-center px-4 md:px-6 py-4 bg-gray-900 text-white gap-3">

    <h1 class="text-xl font-bold text-orange-500">LifeOS</h1>

    <ul class="flex flex-wrap justify-center md:justify-end gap-4 md:gap-6 text-sm">
      <li><a href="index.html" class="hover:text-orange-500">Dashboard</a></li>
      <li><a href="expenses.html" class="hover:text-orange-500">Expenses</a></li>
      <li><a href="planner.html" class="hover:text-orange-500">Study</a></li>
      <li><a href="habits.html" class="hover:text-orange-500">Habits</a></li>
      <li><a href="goals.html" class="hover:text-orange-500">Goals</a></li>
    </ul>

  </nav>

  <!-- Main dashboard -->
  <main class="p-4 md:p-6">

    <!-- Header -->
    <div class="mb-6">
      <h2 class="text-2xl font-bold">Welcome Back</h2>
      <p class="text-gray-600">Here's your daily overview</p>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">

      <!-- Expenses -->
      <div class="bg-white p-5 rounded-xl shadow">
        <p class="text-gray-500">Total Expenses</p>
        <h3 class="text-2xl font-bold text-orange-500" id="totalExpenses">0</h3>
      </div>

      <!-- Tasks -->
      <div class="bg-white p-5 rounded-xl shadow">
        <p class="text-gray-500">Tasks Completed</p>
        <h3 class="text-2xl font-bold" id="tasksDone">0</h3>
      </div>

      <!-- Habits -->
      <div class="bg-white p-5 rounded-xl shadow">
        <p class="text-gray-500">Habits Done Today</p>
        <h3 class="text-2xl font-bold" id="habitsDone">0</h3>
      </div>

    </div>

    <!-- QUICK ACTIONS -->
    <div class="mt-8 bg-white p-5 rounded-xl shadow">
      <h3 class="font-semibold mb-3">Quick Actions</h3>
      <div class="flex flex-wrap gap-3">
        <a href="expenses.html" class="bg-orange-500 text-white px-4 py-2 rounded hover:bg-orange-600">+ Add Expense</a>
        <a href="planner.html" class="bg-gray-800 text-white px-4 py-2 rounded hover:bg-gray-700">+ Add Task</a>
        <a href="habits.html" class="bg-gray-800 text-white px-4 py-2 rounded hover:bg-gray-700">+ Track Habit</a>
      </div>

    </div>

    <!-- FOOTER -->
    <div class="mt-8 text-center text-gray-500 text-sm">
      LifeOS Dashboard © 2026
    </div>

  </main>

</body>
</html>
